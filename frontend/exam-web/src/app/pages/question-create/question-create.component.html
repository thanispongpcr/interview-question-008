<div class="page-container">
  <div class="page-header">
    <h2>IT 08-2</h2>
  </div>

  <div class="form-area">
    <div class="form-row">
      <label>คำถาม</label>
      <input type="text" [(ngModel)]="question.questionText" />
    </div>

    <div class="form-row">
      <label>ตัวเลือก 1</label>
      <input type="text" [(ngModel)]="question.choice1" />
    </div>

    <div class="form-row">
      <label>ตัวเลือก 2</label>
      <input type="text" [(ngModel)]="question.choice2" />
    </div>

    <div class="form-row">
      <label>ตัวเลือก 3</label>
      <input type="text" [(ngModel)]="question.choice3" />
    </div>

    <div class="form-row">
      <label>ตัวเลือก 4</label>
      <input type="text" [(ngModel)]="question.choice4" />
    </div>

    <div class="button-area">
      <button class="btn-save" type="button" (click)="save()">บันทึก</button>
      <button class="btn-cancel" type="button" (click)="cancel()">ยกเลิก</button>
    </div>
  </div>
</div>
